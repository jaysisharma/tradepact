<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0d0d0d"/>

  <!-- Subtle horizontal grid lines -->
  <line x1="72" y1="160" x2="440" y2="160" stroke="#c9a84c" stroke-width="2" opacity="0.12"/>
  <line x1="72" y1="220" x2="440" y2="220" stroke="#c9a84c" stroke-width="2" opacity="0.12"/>
  <line x1="72" y1="280" x2="440" y2="280" stroke="#c9a84c" stroke-width="2" opacity="0.12"/>
  <line x1="72" y1="340" x2="440" y2="340" stroke="#c9a84c" stroke-width="2" opacity="0.12"/>

  <!-- Candle 1: Bearish (hollow outline) — leftmost, shortest -->
  <!-- Upper wick -->
  <line x1="120" y1="252" x2="120" y2="272" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>
  <!-- Body: hollow = bearish -->
  <rect x="96" y="272" width="48" height="58" rx="5" fill="#1a1a1a" stroke="#c9a84c" stroke-width="5"/>
  <!-- Lower wick -->
  <line x1="120" y1="330" x2="120" y2="348" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>

  <!-- Candle 2: Bullish (filled gold) — small -->
  <!-- Upper wick -->
  <line x1="210" y1="218" x2="210" y2="243" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="186" y="243" width="48" height="82" rx="5" fill="#c9a84c"/>
  <!-- Lower wick -->
  <line x1="210" y1="325" x2="210" y2="345" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>

  <!-- Candle 3: Bullish (filled gold) — medium -->
  <!-- Upper wick -->
  <line x1="300" y1="175" x2="300" y2="202" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="276" y="202" width="48" height="115" rx="5" fill="#c9a84c"/>
  <!-- Lower wick -->
  <line x1="300" y1="317" x2="300" y2="340" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>

  <!-- Candle 4: Bullish (filled gold) — tallest, with pact checkmark -->
  <!-- Short upper wick connecting to check-circle -->
  <line x1="390" y1="148" x2="390" y2="158" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="366" y="158" width="48" height="152" rx="5" fill="#c9a84c"/>
  <!-- Lower wick -->
  <line x1="390" y1="310" x2="390" y2="335" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>

  <!-- "Pact" seal: circle with checkmark on candle 4 -->
  <!-- Dark fill so it sits on top of wick cleanly -->
  <circle cx="390" cy="113" r="31" fill="#0d0d0d"/>
  <!-- Gold ring -->
  <circle cx="390" cy="113" r="31" fill="none" stroke="#c9a84c" stroke-width="5.5"/>
  <!-- Checkmark ✓ -->
  <polyline
    points="375,113 386,125 407,96"
    fill="none"
    stroke="#c9a84c"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Baseline -->
  <line x1="72" y1="345" x2="440" y2="345" stroke="#c9a84c" stroke-width="2.5" opacity="0.45"/>
</svg>
