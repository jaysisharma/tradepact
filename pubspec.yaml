name: tradepact
description: "Trading journal app for prop traders. Make a pact. Keep it."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4

  # Ads
  google_mobile_ads: ^5.2.0

  # Auth
  google_sign_in: ^6.2.1

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # AI
  google_generative_ai: ^0.4.6

  # Subscriptions
  purchases_flutter: ^9.16.0

  # Image picker
  image_picker: ^1.1.2

  # Notifications
  flutter_local_notifications: ^17.2.4
  firebase_messaging: ^15.1.3
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2

  # Onboarding + persistence
  shared_preferences: ^2.3.3

  # App info
  package_info_plus: ^8.1.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1c1c1c"
  image: "assets/images/logo.png"
  android_12:
    image: "assets/images/logo.png"
    color: "#1c1c1c"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
